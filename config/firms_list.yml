    ats: unknown
    slug: null
  - name: Ninety One
    # Site blocks scraping (403). Almost certainly Workday given firm size — verify in browser.
    ats: unknown
    slug: null
  - name: Cordiant Capital
    # No public careers page found
    ats: unknown
    slug: null

